site_name: AINPP Precipitation Benchmark
site_description: Automated documentation for the AINPP precipitation nowcasting project.
repo_url: ""
docs_dir: docs
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.instant
    - toc.integrate
  palette:
    - scheme: default
      primary: blue
      accent: deep orange
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            separate_signature: true
            show_root_heading: true
            merge_init_into_class: true
            heading_level: 2

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - API:
      - Overview: api.md
      - Datasets: api/datasets.md
      - Models: api/models.md
      - Evaluation: api/evaluation.md
      - Visualization: api/visualization.md
