# Training configuration
epochs: 10
learning_rate: 1e-4
seed: 42
device: cuda # or cpu
experiment_name: unet_default
distributed: true
dist_backend: nccl

loss:
  name: mse
  # Options: mse, mae, weighted_mse, balanced_mse, ssim, ms_ssim, perceptual, focal, cross_entropy, crps, hybrid
  # Params for specific losses (ignored if not relevant):
  alpha: 0.25 # Focal
  gamma: 2.0 # Focal
  weights: null # For weighted/hybrid losses
