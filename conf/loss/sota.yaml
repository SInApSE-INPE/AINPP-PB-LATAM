_target_: ainpp_pb_latam.losses.HybridLoss
weights: [1.0, 0.1, 0.05]

losses:
  # 1. Base: Advanced Torrential for value accuracy
  - _target_: ainpp_pb_latam.losses.AdvancedTorrentialLoss
    thresholds: [10.0]
    weights: [5.0]

  # 2. Texture: Spectral Loss for global sharpness
  - _target_: ainpp_pb_latam.losses.SpectralLoss
    alpha: 1.0
    beta: 0.5

  # 3. Realism: Perceptual Loss for local structure
  - _target_: ainpp_pb_latam.losses.PerceptualLoss
    layer_ids: [3, 8, 15]